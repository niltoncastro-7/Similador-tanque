<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simulador de Tanque</title>

<style>

body{
    text-align:center;
    font-family:Arial;
}

#tanque{
    width:200px;
    height:400px;
    border:4px solid black;
    margin:auto;
    position:relative;
}

#agua{
    position:absolute;
    bottom:0;
    width:100%;
    height:50%;
    background:skyblue;
}

button{
    margin:10px;
    padding:10px 20px;
}

</style>

</head>
<body>

<h1>Reservorio de Agua Potable</h1>

<div id="tanque">
    <div id="agua"></div>
</div>

<h2 id="nivel">50%</h2>

<button onclick="llenar()">Llenar</button>
<button onclick="vaciar()">Vaciar</button>

<script>

let nivel=50;

function actualizar(){
    document.getElementById("agua").style.height=nivel+"%";
    document.getElementById("nivel").innerText=nivel+"%";
}

function llenar(){

    if(nivel<100){
        nivel=nivel+10;
        actualizar();
    }

}

function vaciar(){

    if(nivel>0){
        nivel=nivel-10;
        actualizar();
    }

}

</script>

</body>
</html>
